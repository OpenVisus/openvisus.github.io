<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact OpenVisus: send us a message with questions or feedback.">
  <title>Contact - OpenVisus</title>
  <link rel="icon" href="images/Logos/OpenVisus_logoArtOnly_Blue.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <script>
    (function(){var t=localStorage.getItem('openvisus-theme');if(t==='light')document.documentElement.setAttribute('data-theme','light');})();
  </script>
</head>
<body>
  <div id="nav-placeholder"></div>
  <div id="subnav-placeholder"></div>

  <main class="main-content">
    <section class="section section-contact">
      <div class="container">
        <p class="section-brand">OpenVisus</p>
        <h1 class="section-title">Contact</h1>
        <p class="section-lead">Have questions or feedback? Send us a message.</p>

        <h2 class="subsection-title">Get in Touch</h2>
        <form class="contact-form" id="contactForm" action="https://formspree.io/f/xwvnldao" method="POST">
          <input type="hidden" name="_subject" value="OpenVisus Website Contact">
          <div class="form-row">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required placeholder="Your name">
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>
          </div>
          <div class="form-group">
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" placeholder="What's this about?">
          </div>
          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" required rows="5" placeholder="Your message..."></textarea>
          </div>
          <button type="submit" class="btn btn-primary btn-block">Send Message</button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>

  <script src="js/main.js"></script>
</body>
</html>
